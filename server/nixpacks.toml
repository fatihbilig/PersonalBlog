# Nixpacks varsayılan nodejs_22 (22.11) Prisma 7.6+ ile uyumsuz. [variables] tek başına
# bazen setup'a yansımaz; nixPkgs ile nodejs_20 zorunlu kılınır.
# Railway'de builder = NIXPACKS kullanıyorsan bu blok gerekli. Dockerfile tercih edilirse bkz. railway.toml.
[phases.setup]
nixPkgs = ["nodejs_20", "npm-9_x", "openssl"]

[variables]
NIXPACKS_NODE_VERSION = "20"
