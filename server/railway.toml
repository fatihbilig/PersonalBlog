# ÖNEMLİ: Railway'de bu servisin "Root Directory" değeri mutlaka "server" olmalı (depo kökü değil).
# Kök dizin yanlışsa bu dosya okunmaz; Nixpacks eski Node (20.18 / 22.11) ile kalır ve Prisma build'i düşer.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

# Bu API servisinde Variables: DATABASE_URL zorunlu. MySQL eklentisi genelde MYSQL_URL üretir;
# burada yeni değişken açıp değer olarak ${{ <MySQL-servis-adın>.MYSQL_URL }} referansını seç (veya Connect’ten mysql://… yapıştır).
[deploy]
startCommand = "npx prisma db push && node dist/index.js"
